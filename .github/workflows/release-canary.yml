name: Release Canary Windows Build

on:
  push:
    tags:
      - "v*-canary*"
  workflow_dispatch:
    inputs:
      tag:
        description: Canary tag to publish, for example v0.1.0-canary.1
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --cwd dictate-app

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Resolve canary tag
        id: release_tag
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            "tag=${{ inputs.tag }}" >> $env:GITHUB_OUTPUT
          } else {
            "tag=${{ github.ref_name }}" >> $env:GITHUB_OUTPUT
          }

      - name: Build canary Windows artifacts
        run: bun run build:canary

      - name: Build Inno Setup installer
        run: bun run build:canary:installer

      - name: Verify release assets
        shell: pwsh
        run: |
          $assets = @(
            "dictate-app/artifacts/canary-win-x64-dictate-Setup-canary.exe",
            "dictate-app/artifacts/canary-win-x64-dictate-Setup-canary.zip",
            "dictate-app/artifacts/canary-win-x64-dictate-canary.tar.zst",
            "dictate-app/artifacts/canary-win-x64-update.json"
          )

          foreach ($asset in $assets) {
            if (-not (Test-Path $asset)) {
              throw "Missing release asset: $asset"
            }
          }

          Get-ChildItem dictate-app/artifacts | Select-Object Name, Length

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: canary-win-x64-${{ steps.release_tag.outputs.tag }}
          if-no-files-found: error
          path: |
            dictate-app/artifacts/canary-win-x64-dictate-Setup-canary.exe
            dictate-app/artifacts/canary-win-x64-dictate-Setup-canary.zip
            dictate-app/artifacts/canary-win-x64-dictate-canary.tar.zst
            dictate-app/artifacts/canary-win-x64-update.json

      - name: Publish canary GitHub release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.release_tag.outputs.tag }}
          name: ${{ steps.release_tag.outputs.tag }}
          prerelease: false
          allowUpdates: true
          replacesArtifacts: true
          artifactErrorsFailBuild: true
          generateReleaseNotes: true
          artifacts: dictate-app/artifacts/canary-win-x64-dictate-Setup-canary.exe,dictate-app/artifacts/canary-win-x64-dictate-Setup-canary.zip,dictate-app/artifacts/canary-win-x64-dictate-canary.tar.zst,dictate-app/artifacts/canary-win-x64-update.json
